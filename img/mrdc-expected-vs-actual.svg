<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Georgia, serif" font-size="12">

  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#b33"/>
    </marker>
  </defs>

  <rect width="920" height="560" fill="#fafaf8"/>

  <!-- Divider -->
  <line x1="430" y1="35" x2="430" y2="520" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- TITLES -->
  <text x="210" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a5a3a">What Communities Expect</text>
  <text x="670" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a3a3a">What the Records Show</text>

  <!-- ======= LEFT SIDE ======= -->

  <rect x="50" y="50" width="130" height="34" rx="4" fill="#3a6a4a" stroke="#2a5a3a"/>
  <text x="115" y="65" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Independent</text>
  <text x="115" y="78" text-anchor="middle" fill="#ddd" font-size="10">Researchers</text>

  <rect x="210" y="50" width="130" height="34" rx="4" fill="#3a5a6a" stroke="#2a4a5a"/>
  <text x="275" y="65" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">University</text>
  <text x="275" y="78" text-anchor="middle" fill="#ddd" font-size="10">Research</text>

  <rect x="90" y="145" width="220" height="38" rx="4" fill="#4a6a4a" stroke="#3a5a3a"/>
  <text x="200" y="162" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Information Coalition</text>
  <text x="200" y="176" text-anchor="middle" fill="#cec" font-size="9">disclosed funding, independent analysis</text>

  <line x1="115" y1="84" x2="165" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="275" y1="84" x2="240" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="90" y="250" width="220" height="38" rx="4" fill="#4a4a6a" stroke="#3a3a5a"/>
  <text x="200" y="267" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Michigan Community</text>
  <text x="200" y="281" text-anchor="middle" fill="#ddd" font-size="9">planning commission, city council</text>

  <line x1="200" y1="183" x2="200" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="215" y="220" fill="#555" font-size="10" font-style="italic">neutral information</text>

  <rect x="110" y="355" width="180" height="36" rx="4" fill="#555" stroke="#444"/>
  <text x="200" y="372" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Informed Decision</text>
  <text x="200" y="385" text-anchor="middle" fill="#ddd" font-size="9">approve, deny, or pause</text>

  <line x1="200" y1="288" x2="200" y2="353" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="40" y="420" width="340" height="22" rx="3" fill="#e8e8e5" stroke="#bbb"/>
  <text x="210" y="435" text-anchor="middle" fill="#777" font-size="9">Industry interests disclosed and separated from information</text>

  <!-- ======= RIGHT SIDE ======= -->

  <!-- DRAW $266K DASHED LINE FIRST so boxes render on top -->
  <path d="M595,84 Q740,180 810,298" fill="none" stroke="#b33" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="738" y="220" fill="#b33" font-size="8">$266K direct</text>

  <!-- Row 1: Industry -->
  <rect x="460" y="50" width="135" height="34" rx="4" fill="#6a3a3a" stroke="#5a2a2a"/>
  <text x="527" y="65" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Consumers / DTE</text>
  <text x="527" y="77" text-anchor="middle" fill="#ddd" font-size="9">utilities</text>

  <rect x="615" y="50" width="135" height="34" rx="4" fill="#6a3a3a" stroke="#5a2a2a"/>
  <text x="682" y="65" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">OE 324 / Laborers</text>
  <text x="682" y="77" text-anchor="middle" fill="#ddd" font-size="9">unions</text>

  <!-- Row 2: Information producers -->
  <rect x="460" y="125" width="80" height="28" rx="3" fill="#4a4a6a" stroke="#3a3a5a"/>
  <text x="500" y="143" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">Bellwether PR</text>

  <rect x="555" y="125" width="60" height="28" rx="3" fill="#5a5a3a" stroke="#4a4a2a"/>
  <text x="585" y="143" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">AEG</text>

  <rect x="630" y="125" width="65" height="28" rx="3" fill="#3a5a6a" stroke="#2a4a5a"/>
  <text x="662" y="140" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">U of M</text>
  <text x="662" y="150" text-anchor="middle" fill="#ddd" font-size="8">guidebook</text>

  <!-- Consumers → AEG (paid for) -->
  <line x1="527" y1="84" x2="575" y2="123" stroke="#b33" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="536" y="110" fill="#b33" font-size="8" font-weight="bold">paid for</text>

  <!-- Consumers → U of M (reviewed) -->
  <line x1="560" y1="84" x2="650" y2="123" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="620" y="102" fill="#555" font-size="8" font-style="italic">reviewed</text>

  <!-- Bellwether → MRDC (no label) -->
  <line x1="500" y1="153" x2="535" y2="198" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AEG → MRDC -->
  <line x1="585" y1="153" x2="580" y2="198" stroke="#b33" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>

  <!-- UofM → MRDC -->
  <line x1="662" y1="153" x2="630" y2="198" stroke="#b33" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="665" y="182" fill="#b33" font-size="8">cited</text>

  <!-- Row 3: MRDC -->
  <rect x="480" y="200" width="200" height="38" rx="4" fill="#2a5a3a" stroke="#1a3a2a"/>
  <text x="580" y="217" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">MRDC Coalition</text>
  <text x="580" y="231" text-anchor="middle" fill="#cec" font-size="9">promises neutral information</text>

  <!-- Row 4: Community -->
  <rect x="480" y="300" width="200" height="38" rx="4" fill="#4a4a6a" stroke="#3a3a5a"/>
  <text x="580" y="317" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Michigan Community</text>
  <text x="580" y="331" text-anchor="middle" fill="#ddd" font-size="9">planning commission, city council</text>

  <!-- MRDC → Community -->
  <line x1="580" y1="238" x2="580" y2="298" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="595" y="272" fill="#b33" font-size="9" font-style="italic">industry-funded information</text>

  <!-- Row 5: Decision -->
  <rect x="500" y="400" width="160" height="36" rx="4" fill="#555" stroke="#444"/>
  <text x="580" y="416" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Decision?</text>
  <text x="580" y="430" text-anchor="middle" fill="#ddd" font-size="9">based on undisclosed interests</text>

  <line x1="580" y1="338" x2="580" y2="398" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RIGHT COLUMN: Money flows -->

  <!-- RTMF -->
  <rect x="790" y="155" width="100" height="42" rx="4" fill="#6a3a3a" stroke="#5a2a2a"/>
  <text x="840" y="173" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">RTMF</text>
  <text x="840" y="185" text-anchor="middle" fill="#ddd" font-size="8">dark money c4</text>
  <text x="840" y="195" text-anchor="middle" fill="#ddd" font-size="8">fmr Lt. Gov</text>

  <!-- Government -->
  <rect x="790" y="270" width="100" height="38" rx="4" fill="#555" stroke="#444"/>
  <text x="840" y="287" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Government</text>
  <text x="840" y="301" text-anchor="middle" fill="#ddd" font-size="8">state + local officials</text>

  <!-- OE 324 → RTMF -->
  <line x1="750" y1="75" x2="808" y2="153" stroke="#b33" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="790" y="108" fill="#b33" font-size="9" font-weight="bold">$250K</text>

  <!-- RTMF → Government -->
  <line x1="840" y1="197" x2="840" y2="268" stroke="#b33" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="855" y="236" fill="#b33" font-size="9" font-weight="bold">$5.5M</text>

  <!-- Government → Community (influence arrow, going left) -->
  <path d="M790,300 Q720,340 682,338" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="720" y="355" fill="#555" font-size="8" font-style="italic">appoints regulators,</text>
  <text x="720" y="365" fill="#555" font-size="8" font-style="italic">directs grants</text>

  <!-- Legend -->
  <rect x="30" y="465" width="860" height="28" rx="3" fill="#f0f0ee" stroke="#ccc"/>
  <line x1="50" y1="481" x2="90" y2="481" stroke="#b33" stroke-width="2"/>
  <text x="100" y="484" fill="#444" font-size="10">Money flow or industry-funded research</text>
  <line x1="370" y1="481" x2="410" y2="481" stroke="#555" stroke-width="1.5"/>
  <text x="420" y="484" fill="#444" font-size="10">Operational relationship</text>
  <text x="670" y="484" fill="#888" font-size="9">Sources: IRS 990, MiTN, FEC, ProPublica. March 2026.</text>

</svg>
