<text x="650" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#6b7280">7x replacements</text>
<text x="180" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#1f2937">Estimated initial fuel cell cost: ~$48-72M (16 MW at ~$3,000-$4,500/kW, current pricing)</text>
<text x="180" y="321" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#dc2626">Deep Green would pay for the first set. BWL would own all replacements.</text>
<text x="410" y="372" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" fill="#6b7280">Sources: Bloom capital cost ~$7-8K/kW (industry analysis); lifespan data from Hindenburg Research and A Better Delaware</text>
