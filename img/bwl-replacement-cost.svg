<text x="410" y="48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6b7280">BWL would own the fuel cells. Replacement cost depends on how long they last.</text>
