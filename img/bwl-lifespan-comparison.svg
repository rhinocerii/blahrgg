<text x="595.6363636363636" y="97" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="white">20 yrs</text>
<text x="230" y="145" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#1f2937">Bloom claimed lifespan</text>
<rect x="240" y="123" width="327.2727272727273" height="36" rx="3" fill="#94a3b8" opacity="0.85"/>
<text x="559.2727272727273" y="145" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="white">18 yrs</text>
<text x="575.2727272727273" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#6b7280">15-21 years (midpoint)</text>
<text x="230" y="193" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#1f2937">Delaware actual</text>
<rect x="240" y="171" width="127.27272727272727" height="36" rx="3" fill="#f97316" opacity="0.85"/>
<text x="359.27272727272725" y="193" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="white">7 yrs</text>
<text x="375.27272727272725" y="193" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#6b7280">Decommissioned</text>
<text x="230" y="241" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#1f2937">Post-2017 cells (Hindenburg)</text>
<rect x="240" y="219" width="54.54545454545454" height="36" rx="3" fill="#dc2626" opacity="0.85"/>
<text x="286.54545454545456" y="241" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="white">&lt;3 yrs</text>
<text x="302.54545454545456" y="241" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#6b7280">Under 3 years</text>
<line x1="240" y1="70" x2="240" y2="255" stroke="#e5e7eb" stroke-width="0.5"/>
<text x="240" y="271" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#6b7280">0 yrs</text>
