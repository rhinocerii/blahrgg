<line x1="512.7272727272727" y1="70" x2="512.7272727272727" y2="255" stroke="#e5e7eb" stroke-width="0.5"/>
<text x="512.7272727272727" y="271" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#6b7280">15 yrs</text>
<line x1="603.6363636363636" y1="70" x2="603.6363636363636" y2="255" stroke="#e5e7eb" stroke-width="0.5"/>
