<text x="350" y="332" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" fill="#6b7280">Sources: Hindenburg Research (Sep 2019); A Better Delaware (Jan 2025); BWL press release (Nov 2025)</text>
