<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
<rect width="700" height="340" fill="#ffffff"/>
<text x="350" y="28" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Fuel Cell Lifespan vs. Contract Term</text>
<text x="350" y="48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6b7280">The proposed BWL contract is 20 years. Bloom's fuel cells have lasted 3 to 7.</text>
<text x="230" y="97" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#1f2937">BWL contract term</text>
