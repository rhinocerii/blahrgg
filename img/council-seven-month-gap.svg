<text x="400" y="272" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" fill="#6b7280">Sources: WKAR (Jan 29, 2026, Peffley "about nine months"); CivicClerk (Hovey last PC appearance Jun 3, 2025); BWL press release (Nov 5, 2025)</text>
