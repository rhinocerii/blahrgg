<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia, serif">
  <rect width="800" height="400" fill="#fafaf8"/>

  <!-- Timeline line -->
  <line x1="80" y1="180" x2="750" y2="180" stroke="#333" stroke-width="2"/>

  <!-- Tick marks and dates -->
  <line x1="120" y1="170" x2="120" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="210" text-anchor="middle" font-size="11" fill="#333">Apr 2025</text>

  <line x1="260" y1="170" x2="260" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="210" text-anchor="middle" font-size="11" fill="#333">Sep 9</text>

  <line x1="310" y1="170" x2="310" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="310" y="210" text-anchor="middle" font-size="11" fill="#333">Sep 23</text>

  <line x1="430" y1="170" x2="430" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="210" text-anchor="middle" font-size="11" fill="#333">Nov 5</text>

  <line x1="470" y1="170" x2="470" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="470" y="210" text-anchor="middle" font-size="11" fill="#333">Nov 6</text>

  <line x1="540" y1="170" x2="540" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="540" y="210" text-anchor="middle" font-size="11" fill="#333">Nov 18</text>

  <line x1="700" y1="170" x2="700" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="700" y="210" text-anchor="middle" font-size="11" fill="#333">Jan 27</text>

  <!-- Secret negotiation bar -->
  <rect x="120" y="155" width="310" height="8" fill="#c44" opacity="0.7" rx="2"/>
  <text x="275" y="148" text-anchor="middle" font-size="11" font-style="italic" fill="#c44">Secret negotiations (under NDA)</text>

  <!-- Events above line (Board actions) -->
  <text x="30" y="50" font-size="12" font-weight="bold" fill="#333">BWL Board</text>

  <line x1="260" y1="170" x2="260" y2="85" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="265" y="75" font-size="11" fill="#333">Ever-Green presents</text>
  <text x="265" y="90" font-size="11" fill="#333">steam conversion.</text>
  <text x="265" y="105" font-size="11" font-weight="bold" fill="#c44">No mention of</text>
  <text x="265" y="120" font-size="11" font-weight="bold" fill="#c44">Deep Green.</text>

  <line x1="310" y1="170" x2="310" y2="130" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="315" y="140" font-size="10" fill="#333">Board approves</text>

  <line x1="540" y1="170" x2="540" y2="85" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="545" y="90" font-size="10" fill="#333">Delegation</text>
  <text x="545" y="103" font-size="10" fill="#333">resolution pulled</text>

  <line x1="700" y1="170" x2="700" y2="120" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="705" y="130" font-size="10" fill="#333">Resolution</text>
  <text x="705" y="143" font-size="10" fill="#333">withdrawn</text>

  <!-- Events below line (Deep Green) -->
  <text x="30" y="260" font-size="12" font-weight="bold" fill="#333">Deep Green</text>

  <line x1="120" y1="190" x2="120" y2="250" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="125" y="250" font-size="11" fill="#333">Peffley begins</text>
  <text x="125" y="265" font-size="11" fill="#333">secret talks</text>

  <line x1="430" y1="190" x2="430" y2="290" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="435" y="290" font-size="11" font-weight="bold" fill="#333">Public announcement:</text>
  <text x="435" y="305" font-size="11" fill="#333">24MW data center,</text>
  <text x="435" y="320" font-size="11" fill="#333">"free waste heat to BWL"</text>

  <line x1="470" y1="190" x2="470" y2="250" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="475" y="250" font-size="11" fill="#333">Peffley declines to</text>
  <text x="475" y="265" font-size="11" fill="#333">name fuel cell co.</text>

  <!-- Source -->
  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#888">Sources: BWL Board packets (lbwl.com/about-bwl/governance); WKAR, Jan 29, 2026.</text>
</svg>
