<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#b91c1c"/>
    </marker>
    <marker id="arr-gray" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#666"/>
    </marker>
    <marker id="arr-blue" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#1e3a5f"/>
    </marker>
  </defs>

  <rect width="960" height="680" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">The Funding Loop</text>
  <text x="480" y="55" text-anchor="middle" font-size="13" fill="#6b7280">UA Local 333 funds Garza. Garza votes on projects. Projects benefit Local 333.</text>

  <!-- ============ TOP: LOCAL 333 PAC ============ -->
  <rect x="320" y="75" width="320" height="70" rx="6" fill="#b45309" stroke="#92400e" stroke-width="2"/>
  <text x="480" y="102" text-anchor="middle" font-size="18" font-weight="bold" fill="white">UA Local 333 PAC</text>
  <text x="480" y="122" text-anchor="middle" font-size="13" fill="#fde68a">$1.96M total spending since 1997</text>

  <!-- ============ LEFT: GARZA ============ -->
  <rect x="40" y="235" width="260" height="70" rx="6" fill="#1e3a5f" stroke="#0f2640" stroke-width="2"/>
  <text x="170" y="262" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Jeremy Garza</text>
  <text x="170" y="282" text-anchor="middle" font-size="13" fill="#b0c4de">VP of Local 333 + Council Member</text>

  <!-- Arrow: Local 333 → Garza ($74.5K) -->
  <path d="M 380 145 L 380 180 L 170 180 L 170 233" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#arr)" fill="none"/>
  <text x="275" y="173" text-anchor="middle" font-size="14" fill="#b91c1c" font-weight="bold">$74,500</text>
  <text x="275" y="191" text-anchor="middle" font-size="11" fill="#666">all-time (campaign + Leadership PAC)</text>

  <!-- ============ RIGHT: OTHER COUNCIL + MAYOR ============ -->
  <rect x="660" y="235" width="260" height="100" rx="6" fill="#0e7490" stroke="#0c5e73" stroke-width="2"/>
  <text x="790" y="260" text-anchor="middle" font-size="14" font-weight="bold" fill="white">4 of 8 Council + Mayor</text>
  <line x1="680" y1="270" x2="900" y2="270" stroke="#0c7a8a" stroke-width="1"/>
  <text x="680" y="290" font-size="12" fill="#a5f3fc">Schor (Mayor)</text>
  <text x="890" y="290" text-anchor="end" font-size="12" font-weight="bold" fill="white">$111,800</text>
  <text x="680" y="308" font-size="12" fill="#a5f3fc">Spadafore, Carter,</text>
  <text x="680" y="323" font-size="12" fill="#a5f3fc">Martinez, Pehlivanoglu</text>
  <text x="890" y="316" text-anchor="end" font-size="12" font-weight="bold" fill="white">$25,500</text>

  <!-- Arrow: Local 333 → Council/Mayor -->
  <path d="M 580 145 L 580 180 L 790 180 L 790 233" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#arr)" fill="none"/>
  <text x="685" y="173" text-anchor="middle" font-size="14" fill="#b91c1c" font-weight="bold">$137,300</text>

  <!-- ============ CENTER: CITY COUNCIL VOTES ============ -->
  <rect x="310" y="395" width="340" height="65" rx="6" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <text x="480" y="422" text-anchor="middle" font-size="16" font-weight="bold" fill="white">City Council Votes</text>
  <text x="480" y="442" text-anchor="middle" font-size="13" fill="#9ca3af">development, zoning, construction projects</text>

  <!-- Arrow: Garza → Council Votes -->
  <line x1="200" y1="305" x2="200" y2="427" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <text x="220" y="370" font-size="13" fill="#1e3a5f" font-weight="bold">votes on</text>

  <!-- Arrow: Other Council → Council Votes -->
  <path d="M 790 335 L 790 427 L 652 427" stroke="#666" stroke-width="2" marker-end="url(#arr-gray)" fill="none"/>
  <text x="820" y="385" font-size="13" fill="#666">vote on</text>

  <!-- ============ BOTTOM: UNION LABOR CONTRACTS ============ -->
  <rect x="310" y="520" width="340" height="65" rx="6" fill="#2d5f2d" stroke="#1a3d1a" stroke-width="2"/>
  <text x="480" y="547" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Union Labor Contracts</text>
  <text x="480" y="567" text-anchor="middle" font-size="13" fill="#b0deb0">construction jobs for Local 333 members</text>

  <!-- Arrow: Council Votes → Union Labor -->
  <line x1="480" y1="460" x2="480" y2="518" stroke="#666" stroke-width="2.5" marker-end="url(#arr-gray)"/>
  <text x="500" y="495" font-size="13" fill="#666">approve projects that include</text>

  <!-- ============ CLOSING THE LOOP: Union Labor → Local 333 ============ -->
  <path d="M 310 552 L 40 552 L 40 110 L 318 110" stroke="#b91c1c" stroke-width="3" marker-end="url(#arr)" fill="none" stroke-dasharray="8,4"/>
  <text x="30" y="340" font-size="14" fill="#b91c1c" font-weight="bold" transform="rotate(-90, 30, 340)">benefits flow back to union</text>

  <!-- ============ DEEP GREEN callout ============ -->
  <rect x="660" y="505" width="260" height="80" rx="6" fill="#fff" stroke="#b91c1c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="790" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">Current Example</text>
  <text x="790" y="548" text-anchor="middle" font-size="12" fill="#374151">Deep Green data center ($120M)</text>
  <text x="790" y="565" text-anchor="middle" font-size="12" fill="#374151">"contractual commitments"</text>
  <text x="790" y="580" text-anchor="middle" font-size="12" fill="#374151">to union labor</text>

  <!-- Arrow from Deep Green callout to Union Labor -->
  <line x1="660" y1="552" x2="652" y2="552" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============ 428 W LENAWEE callout ============ -->
  <rect x="40" y="395" width="220" height="65" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <text x="150" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Garza Leadership PAC</text>
  <text x="150" y="436" text-anchor="middle" font-size="11" fill="#666">428 W Lenawee St (dark money address)</text>
  <text x="150" y="450" text-anchor="middle" font-size="11" fill="#666">Treasurer: Jack Rucker (Nova Law)</text>

  <!-- Arrow: Garza → Leadership PAC -->
  <path d="M 120 305 L 120 393" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>

  <!-- ============ KEY STAT ============ -->
  <rect x="310" y="610" width="340" height="35" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="480" y="633" text-anchor="middle" font-size="13" fill="#b91c1c" font-weight="bold">$24,500 from Local 333 = largest single expenditure in PAC's 28-year history</text>

  <!-- Source -->
  <text x="480" y="670" text-anchor="middle" font-size="11" fill="#6b7280">Sources: MiTN Committees 46714, 507652, 519962 | Ingham County campaign finance portal | CivicClerk Feb 9, 2026 hearing</text>
</svg>
