  <text x="140" y="720" text-anchor="middle" font-size="11" fill="#93c5fd">$229K to GM (3 entities)</text>

  <!-- Local 333 -->
  <rect x="280" y="680" width="200" height="55" rx="6" fill="#1e3a5f" stroke="#0f2640" stroke-width="2"/>
  <text x="380" y="703" text-anchor="middle" font-size="14" font-weight="bold" fill="white">LOCAL 333</text>
  <text x="380" y="720" text-anchor="middle" font-size="11" fill="#93c5fd">$203K to GM · Union PAC</text>

  <!-- Chamber -->
  <rect x="520" y="680" width="200" height="55" rx="6" fill="#1e3a5f" stroke="#0f2640" stroke-width="2"/>
  <text x="620" y="703" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CHAMBER PAC</text>
  <text x="620" y="720" text-anchor="middle" font-size="11" fill="#93c5fd">$32K to GM · LRC-PAC</text>

  <!-- Arrows: GM → political actors -->
  <line x1="410" y1="615" x2="140" y2="675" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="490" y1="615" x2="380" y2="675" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="560" y1="615" x2="620" y2="675" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Arrow: Local 333 → Schor -->
  <line x1="280" y1="707" x2="245" y2="707" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="262" y="700" text-anchor="middle" font-size="9" fill="#1e3a5f">$112K</text>

  <!-- ═══════ ROW 6: CITY COUNCIL ═══════ -->

  <rect x="200" y="790" width="400" height="65" rx="6" fill="#166534" stroke="#14532d" stroke-width="2"/>
  <text x="400" y="815" text-anchor="middle" font-size="16" font-weight="bold" fill="white">LANSING CITY COUNCIL</text>
  <text x="400" y="835" text-anchor="middle" font-size="12" fill="#86efac">7 of 8 members funded by Chamber PAC or Local 333</text>
  <text x="400" y="848" text-anchor="middle" font-size="10" fill="#86efac">Ryan Kost (Ward 1) is the only exception: $0 from either source</text>

  <!-- Arrows: political actors → council -->
  <line x1="380" y1="735" x2="370" y2="785" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="350" y="765" font-size="10" fill="#1e3a5f">$104K</text>
  <line x1="620" y1="735" x2="500" y2="785" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="575" y="765" font-size="10" fill="#1e3a5f">$26K</text>

  <!-- Council votes on -->
  <text x="400" y="880" text-anchor="middle" font-size="12" fill="#166534">↓ Votes on zoning, development, contracts, and policy</text>

  <!-- DTE Energy -->
  <rect x="700" y="340" width="220" height="55" rx="6" fill="#b91c1c" stroke="#7f1d1d" stroke-width="2"/>
  <text x="810" y="363" text-anchor="middle" font-size="13" font-weight="bold" fill="white">DTE ENERGY</text>
  <text x="810" y="378" text-anchor="middle" font-size="10" fill="#fca5a5">MI's 2nd utility · PAC $ → Felsing clients</text>

  <!-- Arrow: DTE → Felsing network -->
  <line x1="700" y1="367" x2="590" y2="350" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="648" y="347" font-size="9" fill="#7f1d1d">$31K treasurer fees</text>

  <!-- ═══════ CAPTION ═══════ -->
  <text x="480" y="1010" text-anchor="middle" font-size="11" fill="#666">Sources: IRS 990 (EIN 46-4355362, Schedule I), FEC (C00825901), LARA (802764120, 802559806),</text>
  <text x="480" y="1025" text-anchor="middle" font-size="11" fill="#666">MiTN (507652, 000516), Ingham County EasyVote, SoundCloud (TicketSplitters Ep. 10 &amp; 13)</text>

  <!-- Legend -->
  <rect x="40" y="1045" width="880" height="45" rx="4" fill="#e5e7eb"/>
  <rect x="55" y="1058" width="14" height="14" rx="2" fill="#b91c1c"/>
  <text x="75" y="1070" font-size="10" fill="#333">Utility / dark money</text>
  <rect x="185" y="1058" width="14" height="14" rx="2" fill="#c2410c"/>
  <text x="205" y="1070" font-size="10" fill="#333">Felsing network</text>
  <rect x="305" y="1058" width="14" height="14" rx="2" fill="#7c3aed"/>
  <text x="325" y="1070" font-size="10" fill="#333">Judge Felsing</text>
  <rect x="415" y="1058" width="14" height="14" rx="2" fill="#1e293b"/>
  <text x="435" y="1070" font-size="10" fill="#333">Grassroots Midwest</text>
  <rect x="565" y="1058" width="14" height="14" rx="2" fill="#1e3a5f"/>
  <text x="585" y="1070" font-size="10" fill="#333">Political actors</text>
  <rect x="675" y="1058" width="14" height="14" rx="2" fill="#166534"/>
  <text x="695" y="1070" font-size="10" fill="#333">Council</text>
</svg>
