<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Georgia, serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <rect width="800" height="320" fill="#fafaf8"/>

  <!-- Deep Green box -->
  <rect x="40" y="60" width="200" height="90" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Deep Green</text>
  <text x="140" y="112" text-anchor="middle" font-size="13" fill="#555">Builds the facility</text>
  <text x="140" y="130" text-anchor="middle" font-size="13" fill="#555">1 MW experience (UK)</text>

  <!-- BWL box -->
  <rect x="300" y="60" width="200" height="90" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">BWL</text>
  <text x="400" y="112" text-anchor="middle" font-size="13" fill="#555">Owns fuel cells</text>
  <text x="400" y="130" text-anchor="middle" font-size="13" fill="#555">Funded by ratepayers</text>

  <!-- Bloom box -->
  <rect x="560" y="60" width="200" height="90" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="660" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Bloom Energy</text>
  <text x="660" y="112" text-anchor="middle" font-size="13" fill="#555">Operates power plant</text>
  <text x="660" y="130" text-anchor="middle" font-size="13" fill="#555">Contract not disclosed</text>

  <!-- Arrows -->
  <line x1="240" y1="105" x2="298" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="105" x2="558" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Question box -->
  <rect x="200" y="200" width="400" height="70" rx="4" fill="#f5f0e8" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="228" text-anchor="middle" font-size="14" fill="#555">If fuel cells underperform or generate hazardous waste,</text>
  <text x="400" y="250" text-anchor="middle" font-size="14" fill="#555">which entity bears the cost?</text>

  <!-- Dashed lines down to question -->
  <line x1="140" y1="150" x2="300" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="150" x2="400" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="660" y1="150" x2="500" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Source -->
  <text x="400" y="305" text-anchor="middle" font-size="11" fill="#888">Contract terms have not been disclosed to Council, Planning Commission, or public.</text>
</svg>
